<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <title>Turant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="stylesheet" href="/css/style.css?v=31">
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js" type="module"></script>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <a href="/" class="logo">
          <span class="logo-deva">तु</span>
          <div class="logo-right">
            <svg class="logo-chevrons" viewBox="0 0 34 16" fill="none">
              <path d="M2 2 L8 8 L2 14" stroke="#E8A263" stroke-width="2" fill="none" stroke-linejoin="miter" stroke-linecap="square"/>
              <path d="M12 2 L18 8 L12 14" stroke="#E8A263" stroke-width="2" fill="none" stroke-linejoin="miter" stroke-linecap="square"/>
              <path d="M22 2 L28 8 L22 14" stroke="#E8A263" stroke-width="2" fill="none" stroke-linejoin="miter" stroke-linecap="square"/>
            </svg>
            <span class="logo-rant">rant</span>
          </div>
        </a>
        <button class="settings-btn" id="settingsToggle" title="Settings">&#9881;</button>
      </div>
      <div class="search-row">
        <input type="text" id="movieInput" placeholder="Search movies, series, anything..." autocomplete="off">
        <button id="searchBtn">Search</button>
      </div>
      <div class="filter-row">
        <button class="cat-btn active" data-cat="all">All</button>
        <button class="cat-btn" data-cat="movie">Movies</button>
        <button class="cat-btn" data-cat="series">Series</button>
        <button class="cat-btn" data-cat="porn">Adult</button>
        <button class="cat-btn" data-cat="hentai">Hentai</button>
      </div>
      <div class="settings-panel" id="settingsPanel">
        <label>Real-Debrid API Token</label>
        <div class="rd-input-row">
          <input type="text" id="rdTokenInput" placeholder="Paste your RD API token..." autocomplete="off">
          <button class="save-btn" id="rdSaveBtn">Save</button>
        </div>
        <div class="rd-status" id="rdStatus"></div>
      </div>
    </div>
  </div>

  <div class="content">
    <div id="catalogSection">
      <div class="catalog-header">
        <div class="catalog-tabs">
          <button class="catalog-tab active" data-catalog="movie-year">New Movies</button>
          <button class="catalog-tab" data-catalog="series-year">New Series</button>
          <button class="catalog-tab" data-catalog="movie-top">Popular</button>
          <button class="catalog-tab" data-catalog="movie-imdbRating">Top Rated</button>
        </div>
      </div>
      <div class="filmstrip-wrapper">
        <div class="filmstrip" id="catalogStrip"></div>
      </div>
    </div>
  </div>

  <!-- Player overlay (needed for streaming from catalog) -->
  <div class="player-overlay" id="playerOverlay">
    <div class="player-topbar">
      <button class="player-back" id="playerBack"><span class="player-back-icon">&larr;</span> Close</button>
      <div class="player-title" id="playerTitle"></div>
    </div>
    <div class="player-video-wrap" id="playerVideoWrap">
      <video id="playerVideo" autoplay playsinline></video>
    </div>
    <div class="player-controls">
      <div class="player-progress" id="playerProgress">
        <div class="player-progress-fill" id="playerProgressFill"></div>
      </div>
      <div class="player-controls-row">
        <div class="player-controls-left">
          <button class="player-ctrl-btn" id="playerPlayPause" title="Play/Pause">&#9654;&#xFE0E;</button>
          <button class="player-ctrl-btn" id="playerSkipBack" title="-10s" style="font-size:0.75rem;font-weight:600;letter-spacing:0.02em">-10</button>
          <button class="player-ctrl-btn" id="playerSkipFwd" title="+10s" style="font-size:0.75rem;font-weight:600;letter-spacing:0.02em">+10</button>
          <div class="player-volume-wrap">
            <button class="player-ctrl-btn" id="playerMute" title="Mute">&#128264;</button>
            <input type="range" class="player-volume" id="playerVolume" min="0" max="1" step="0.05" value="1">
          </div>
          <span class="player-time" id="playerTime">0:00 / 0:00</span>
        </div>
        <div class="player-controls-right">
          <button class="player-ctrl-btn" id="playerSpeedBtn" title="Speed">1x</button>
          <div class="player-subs-wrap">
            <button class="player-ctrl-btn" id="playerSubsBtn" title="Subtitles">CC</button>
            <div class="player-subs-menu" id="playerSubsMenu"></div>
          </div>
          <button class="player-ctrl-btn" id="playerPipBtn" title="Picture-in-Picture">PiP</button>
          <button class="player-ctrl-btn" id="playerFullscreen" title="Fullscreen">&#x26F6;</button>
        </div>
      </div>
    </div>
    <div class="player-time-tooltip" id="playerTimeTooltip"></div>
    <div class="player-thumb-preview" id="playerThumbPreview">
      <img id="playerThumbImg" src="" alt="">
    </div>
  </div>

  <div class="overlay" id="loadingOverlay">
    <div class="overlay-counter" id="overlayCounter">00:00</div>
    <div class="overlay-logo">
      <span class="logo-deva" style="font-size:48px;line-height:0.85">तु</span>
      <div class="logo-right" style="gap:3px;padding-bottom:2px">
        <svg style="width:24px;height:auto;display:block" viewBox="0 0 34 16" fill="none">
          <path d="M2 2 L8 8 L2 14" stroke="#E8A263" stroke-width="2" fill="none" stroke-linejoin="miter" stroke-linecap="square"/>
          <path d="M12 2 L18 8 L12 14" stroke="#E8A263" stroke-width="2" fill="none" stroke-linejoin="miter" stroke-linecap="square"/>
          <path d="M22 2 L28 8 L22 14" stroke="#E8A263" stroke-width="2" fill="none" stroke-linejoin="miter" stroke-linecap="square"/>
        </svg>
        <span class="logo-rant" style="font-size:14px">rant</span>
      </div>
    </div>
    <div class="film-bars">
      <div class="film-bar"></div>
      <div class="film-bar"></div>
      <div class="film-bar"></div>
      <div class="film-bar"></div>
      <div class="film-bar"></div>
      <div class="film-bar"></div>
      <div class="film-bar"></div>
    </div>
    <div class="loading-text" id="loadingText">Loading</div>
    <div class="loading-subtext" id="loadingSubtext">Preparing catalog.</div>
    <div class="overlay-progress"></div>
  </div>

  <script src="/js/ui.js?v=31"></script>
  <script src="/js/api.js?v=31"></script>
  <script>
    const input = document.getElementById('movieInput');
    const catalogStrip = document.getElementById('catalogStrip');

    // ═══════════════════════════════════════════
    // CATEGORY FILTER
    // ═══════════════════════════════════════════
    let activeCategory = 'all';
    document.querySelectorAll('.cat-btn').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        activeCategory = b.dataset.cat;
      });
    });

    // ═══════════════════════════════════════════
    // SEARCH → navigate to search.html
    // ═══════════════════════════════════════════
    document.getElementById('searchBtn').addEventListener('click', () => {
      const q = input.value.trim();
      if (q) navigateToSearch(q, activeCategory);
    });
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const q = input.value.trim();
        if (q) navigateToSearch(q, activeCategory);
      }
    });

    // ═══════════════════════════════════════════
    // CATALOG — filmstrip
    // ═══════════════════════════════════════════
    const catalogCache = {};
    let expandedSlice = null;

    function showSkeleton() {
      catalogStrip.innerHTML = '';
      catalogStrip.className = 'filmstrip-skeleton';
      for (let i = 0; i < 18; i++) {
        const sk = document.createElement('div');
        sk.className = 'skeleton-slice';
        catalogStrip.appendChild(sk);
      }
    }

    async function loadCatalog(key) {
      if (catalogCache[key]) { renderFilmstrip(catalogCache[key]); return; }
      showSkeleton();
      try {
        const [type, catalogId] = key.split('-');
        const res = await fetch(`/api/catalog/${type}/${catalogId}`);
        const data = await res.json();
        catalogCache[key] = data.metas || [];
        renderFilmstrip(catalogCache[key]);
      } catch {
        catalogStrip.innerHTML = '<div style="color:var(--text-muted);padding:3rem;font-size:0.75rem;letter-spacing:0.06em;text-transform:uppercase">Could not load catalog</div>';
        catalogStrip.className = 'filmstrip';
      }
    }

    function renderFilmstrip(metas) {
      catalogStrip.innerHTML = '';
      catalogStrip.className = 'filmstrip';
      expandedSlice = null;

      metas.forEach((m, idx) => {
        const slice = document.createElement('div');
        slice.className = 'film-slice';
        if (idx === 0) slice.classList.add('expanded');

        const bgImg = m.background || m.logo || m.poster || '';
        const posterImg = m.poster || '';
        const rating = m.imdbRating ? `<span class="film-slice-rating">${m.imdbRating}</span>` : '';
        const typeLabel = m.type === 'series' ? 'Series' : 'Movie';

        slice.innerHTML = `
          <span class="film-slice-num">${String(idx + 1).padStart(2, '0')}</span>
          <img class="film-slice-img" src="${bgImg}" alt="${m.name}" loading="lazy" draggable="false"
               onerror="this.src='${posterImg}'; this.onerror=null;">
          <div class="film-slice-info">
            <div class="film-slice-title">${m.name}</div>
            <div class="film-slice-meta">${typeLabel} &middot; ${m.year || ''}${rating}</div>
            <div class="film-slice-explore" data-idx="${idx}">Explore</div>
          </div>
        `;

        slice.addEventListener('click', (e) => {
          if (catalogStrip._dragMoved && catalogStrip._dragMoved()) return;

          if (e.target.classList.contains('film-slice-explore') || slice.classList.contains('expanded')) {
            const cat = m.type === 'series' ? 'series' : 'movie';
            navigateToSearch(m.name, cat);
            return;
          }

          if (expandedSlice) expandedSlice.classList.remove('expanded');
          slice.classList.add('expanded');
          expandedSlice = slice;
          slice.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        });

        if (idx === 0) expandedSlice = slice;
        catalogStrip.appendChild(slice);
      });

      enableDragScroll(catalogStrip);
    }

    document.querySelectorAll('.catalog-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.catalog-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        loadCatalog(tab.dataset.catalog);
      });
    });

    enableDragScroll(catalogStrip);
    loadCatalog('movie-year');

    // Handle back button for player
    window.addEventListener('popstate', (e) => {
      if (playerOverlay.classList.contains('open')) {
        playerPushedState = false;
        closePlayerInternal();
        return;
      }
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
