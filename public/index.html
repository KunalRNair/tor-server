<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Turent - Premium Torrent downloader</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1e38 100%);
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.5);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--bg-gradient);
      font-family: 'Outfit', sans-serif;
      color: #fff;
      overflow-y: auto;
      padding: 2rem;
      box-sizing: border-box;
    }
    /* Floating background shapes for premium feel */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      opacity: 0.5;
      animation: float 10s ease-in-out infinite alternate;
    }
    .blob-1 { top: -100px; left: -100px; width: 400px; height: 400px; background: #ec4899; }
    .blob-2 { bottom: -100px; right: -100px; width: 500px; height: 500px; background: #8b5cf6; animation-delay: -5s;}

    @keyframes float {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(30px) scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 10;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3rem 4rem;
      width: 100%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease;
    }
    .container:hover {
      transform: translateY(-5px);
    }

    h1 {
      margin: 0 0 1rem 0;
      font-size: 2.5rem;
      font-weight: 600;
      background: linear-gradient(to right, #fff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #cbd5e1;
      font-size: 1.1rem;
      font-weight: 300;
      margin-bottom: 2.5rem;
    }

    .search-group {
      position: relative;
      display: flex;
      gap: 1rem;
    }
    
    input {
      flex: 1;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      padding: 1rem 1.5rem;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }
    input::placeholder { color: #64748b; }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--accent-glow);
      background: rgba(0,0,0,0.4);
    }

    button {
      background: var(--accent);
      border: none;
      padding: 1rem 2rem;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    button::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: all 0.5s ease;
    }
    button:hover {
      background: #7c3aed;
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    button:hover::before { left: 100%; }

    /* Loading Overlay */
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid var(--glass-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 2rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .loading-subtext {
      color: #94a3b8;
      font-size: 1rem;
      max-width: 400px;
      text-align: center;
      line-height: 1.5;
    }

    .results-container {
      position: relative;
      z-index: 10;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2rem;
      width: 100%;
      max-width: 600px;
      margin-top: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      max-height: 50vh;
      overflow-y: auto;
    }
    .results-container h2 {
      margin-top: 0;
      color: #a78bfa;
      font-size: 1.5rem;
    }
    .result-item {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 1rem;
      text-align: left;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .result-item:hover {
      border-color: var(--accent);
      background: rgba(0,0,0,0.4);
    }
    .result-title {
      font-weight: 600;
      color: #fff;
    }
    .result-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.9rem;
      color: #94a3b8;
    }
    .download-btn {
      align-self: flex-start;
      margin-top: 0.5rem;
      padding: 0.6rem 1.2rem;
      font-size: 0.9rem;
    }
    .results-container::-webkit-scrollbar { width: 8px; }
    .results-container::-webkit-scrollbar-track { background: transparent; }
    .results-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .filters {
      margin-top: 1rem;
      text-align: left;
      font-size: 0.95rem;
      color: #cbd5e1;
      display: flex;
      align-items: center;
    }
    .filters input {
      margin-right: 0.5rem;
      width: auto;
      accent-color: var(--accent);
    }
    
    @media (max-width: 600px) {
      * { box-sizing: border-box; }
      body { 
        padding: 0; 
        margin: 0; 
        justify-content: flex-start;
        background: #000;
      }
      .blob { display: none; }
      .container {
        padding: 2rem 1.5rem 1.5rem 1.5rem;
        width: 100%;
        max-width: 100%;
        border-radius: 0;
        border: none;
        box-shadow: none;
        background: rgba(20, 20, 22, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        position: sticky;
        top: 0;
        z-index: 50;
        border-bottom: 0.5px solid rgba(255,255,255,0.1);
      }
      h1 { font-size: 2.2rem; margin-bottom: 0.2rem; text-align: left; }
      p { text-align: left; margin-bottom: 1.5rem; font-size: 1rem; }
      .search-group {
        flex-direction: row;
        gap: 0.5rem;
      }
      input { 
        font-size: 16px; 
        border-radius: 12px; 
        padding: 0.8rem 1.2rem; 
        background: rgba(255,255,255,0.1);
        border: none;
      }
      button {
        width: auto;
        padding: 0.8rem 1.2rem;
        border-radius: 12px;
      }
      .results-container {
        padding: 1rem;
        width: 100%;
        max-width: 100%;
        margin-top: 0;
        border-radius: 0;
        border: none;
        background: #000;
        box-shadow: none;
        max-height: none;
        overflow-y: visible;
      }
      .results-container h2 { font-size: 1.4rem; margin-bottom: 1rem; margin-left: 0.5rem; color: #fff; }
      .result-item {
        background: #1c1c1e;
        border: none;
        border-radius: 16px;
        padding: 1.2rem;
        margin-bottom: 1rem;
      }
      .result-title { font-size: 1.1rem; }
      .result-meta {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 0.8rem;
        margin-top: 0.2rem;
      }
      .download-btn {
        width: 100%;
        text-align: center;
        background: var(--accent);
        margin-top: 1rem;
        padding: 1rem;
        border-radius: 14px;
        font-weight: 600;
      }
      .filters { 
        justify-content: flex-start;
        opacity: 0.8;
      }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="container">
    <h1>Turent</h1>
    <p>Premium Movie Downloader</p>

    <div class="search-group">
      <input type="text" id="movieInput" placeholder="Type a movie name..." autocomplete="off">
      <button id="searchBtn">Search</button>
    </div>
    <div class="filters">
      <label>
        <input type="checkbox" id="sortLatest"> Sort by Latest Release
      </label>
    </div>
  </div>

  <div class="results-container" id="resultsContainer" style="display: none;">
    <h2>Search Results</h2>
    <div id="resultsList" class="results-list"></div>
  </div>

  <div class="overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Finding & Downloading...</div>
    <div class="loading-subtext">We are searching the torrent swarm and acquiring the high-quality files. Please do not close this page. Your download will start automatically on this device shortly.</div>
  </div>

  <script>
    const btn = document.getElementById('searchBtn');
    const input = document.getElementById('movieInput');
    const overlay = document.getElementById('loadingOverlay');
    const resultsContainer = document.getElementById('resultsContainer');
    const resultsList = document.getElementById('resultsList');

    const BEST_TRACKERS = [
      'udp://tracker.opentrackr.org:1337/announce',
      'udp://tracker.openbittorrent.com:6969/announce',
      'udp://tracker.torrent.eu.org:451/announce',
      'udp://tracker.moeking.me:6969/announce',
      'udp://tracker.zer0day.to:1337/announce',
      'udp://tracker.leechers-paradise.org:6969/announce',
      'udp://coppersurfer.tk:6969/announce',
      'udp://tracker.internetwarriors.net:1337/announce',
      'wss://tracker.btorrent.xyz',
      'wss://tracker.openwebtorrent.com',
      'wss://tracker.fastcast.nz'
    ];
    const trString = BEST_TRACKERS.map(tr => '&tr=' + encodeURIComponent(tr)).join('');

    // ---------------------------------------------------------------------------
    // CLIENT-SIDE SEARCH: Runs directly from your phone's browser.
    // Your residential IP (Jio/Airtel) is never blocked by Cloudflare.
    // The Render server is NOT involved in search at all.
    // ---------------------------------------------------------------------------
    async function executeSearch() {
      const query = input.value.trim();
      if (!query) return;

      overlay.classList.add('active');
      document.querySelector('.loading-text').innerText = "Searching swarm...";
      document.querySelector('.loading-subtext').innerText = "Your phone is searching directly. No cloud middleman!";
      resultsContainer.style.display = 'none';

      try {
        let results = [];

        // Step 1: Search Cinemeta for IMDb ID (runs from phone browser — Cloudflare allows residential IPs)
        const metaRes = await fetch(
          `https://v3-cinemeta.strem.io/catalog/movie/top/search=${encodeURIComponent(query)}.json`
        );
        const metaText = await metaRes.text();
        if (metaText.trim().startsWith('<')) throw new Error('Cinemeta returned HTML — possible block. Try again.');
        const metaData = JSON.parse(metaText);

        if (!metaData || !metaData.metas || metaData.metas.length === 0) {
          throw new Error("No results found for this movie.");
        }

        const meta = metaData.metas[0];
        const imdbId = meta.imdb_id;

        // Step 2: Query Torrentio with IMDb ID (also runs from phone browser)
        let endpoint = `https://torrentio.strem.fun/stream/movie/${imdbId}.json`;
        if (meta.type === 'series') {
          endpoint = `https://torrentio.strem.fun/stream/series/${imdbId}:1:1.json`;
        }

        const torRes = await fetch(endpoint);
        const torText = await torRes.text();
        if (torText.trim().startsWith('<')) throw new Error('Torrentio returned HTML — possible block. Try again.');
        const torData = JSON.parse(torText);

        if (torData && torData.streams) {
          for (const s of torData.streams) {
            if (!s.infoHash) continue;

            let seeders = 0;
            let size = "Unknown";
            if (s.title) {
              const seedMatch = s.title.match(/👤\s*(\d+)/);
              if (seedMatch) seeders = parseInt(seedMatch[1], 10);
              const sizeMatch = s.title.match(/💾\s*([^⚙️\n]+)/);
              if (sizeMatch) size = sizeMatch[1].trim();
            }

            const cleanName = (s.title || query).split('\n')[0];
            const trackerName = (s.name || 'Torrent').split('\n')[0];
            const magnet = `magnet:?xt=urn:btih:${s.infoHash}&dn=${encodeURIComponent(cleanName)}${trString}`;

            results.push({
              name: `(${trackerName}) ${cleanName}`,
              size: size,
              seeders: seeders,
              magnet: magnet
            });
          }
        }

        if (results.length === 0) {
          throw new Error("No torrent results found for this title.");
        }

        // Sort by latest release year if checkbox is checked
        const isSortLatest = document.getElementById('sortLatest').checked;
        if (isSortLatest) {
          results.sort((a, b) => {
            const yearA = parseInt(a.name.match(/\((\d{4})\)/)?.[1] || 0, 10);
            const yearB = parseInt(b.name.match(/\((\d{4})\)/)?.[1] || 0, 10);
            return yearB - yearA;
          });
        }

        // Render results
        overlay.classList.remove('active');
        resultsContainer.style.display = 'block';
        resultsList.innerHTML = '';

        results.slice(0, 20).forEach(res => {
          const item = document.createElement('div');
          item.className = 'result-item';
          item.innerHTML = `
            <div class="result-title">${res.name}</div>
            <div class="result-meta">
              <span>Size: ${res.size}</span>
              <span>Seeders: ${res.seeders}</span>
            </div>
            <button class="download-btn" onclick="startDownload('${encodeURIComponent(res.magnet)}', '${res.name.replace(/'/g, "\\'")}')">Download</button>
          `;
          resultsList.appendChild(item);
        });
      } catch (e) {
        document.querySelector('.loading-text').innerText = "Error Occurred";
        document.querySelector('.loading-subtext').innerText = e.message;
        setTimeout(() => overlay.classList.remove('active'), 4000);
      }
    }

    // ---------------------------------------------------------------------------
    // DOWNLOAD: This still goes through the Render server's WebTorrent engine.
    // WebTorrent uses P2P — ISPs/Cloudflare can't block it.
    // ---------------------------------------------------------------------------
    async function startDownload(encodedMagnet, name) {
      overlay.classList.add('active');
      document.querySelector('.loading-text').innerText = "Fetching metadata...";
      document.querySelector('.loading-subtext').innerText = `Extracting files for: ${name}`;

      try {
        const metaRes = await fetch('/api/metadata?magnet=' + encodedMagnet);
        const metaData = await metaRes.json();

        if (!metaData.files || metaData.files.length === 0) {
          throw new Error("Could not parse torrent contents.");
        }

        const largestFile = metaData.files.reduce((a, b) => a.sizeBytes > b.sizeBytes ? a : b);

        document.querySelector('.loading-text').innerText = "Download Starting...";
        document.querySelector('.loading-subtext').innerText = `Downloading: ${largestFile.name}. Check your browser.`;

        window.location.href = `/api/download?magnet=${encodedMagnet}&fileIndex=${largestFile.index}`;

        setTimeout(() => overlay.classList.remove('active'), 3000);
      } catch (e) {
        document.querySelector('.loading-text').innerText = "Error Occurred";
        document.querySelector('.loading-subtext').innerText = e.message;
        setTimeout(() => overlay.classList.remove('active'), 4000);
      }
    }

    btn.addEventListener('click', executeSearch);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') executeSearch();
    });
  </script>
</body>
</html>
