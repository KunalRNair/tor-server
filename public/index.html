<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Turent</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%238b5cf6' width='100' height='100' rx='20'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white'>T</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.4);
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #000;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Desktop: centered glass card ── */
    @media (min-width: 601px) {
      body {
        justify-content: center;
        background: linear-gradient(135deg, #0f172a 0%, #1e1e38 100%);
        padding: 2rem;
      }
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        z-index: 0;
        opacity: 0.5;
        animation: float 10s ease-in-out infinite alternate;
      }
      .blob-1 { top: -100px; left: -100px; width: 400px; height: 400px; background: #ec4899; }
      .blob-2 { bottom: -100px; right: -100px; width: 500px; height: 500px; background: #8b5cf6; animation-delay: -5s; }
      @keyframes float {
        0% { transform: translateY(0) scale(1); }
        100% { transform: translateY(30px) scale(1.1); }
      }
      .container {
        position: relative; z-index: 10;
        background: var(--card-bg);
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--card-border);
        border-radius: 24px;
        padding: 3rem 4rem;
        width: 100%; max-width: 500px;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        transition: transform 0.3s ease;
      }
      .container:hover { transform: translateY(-4px); }
      .results-container {
        position: relative; z-index: 10;
        background: var(--card-bg);
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--card-border);
        border-radius: 24px;
        padding: 2rem;
        width: 100%; max-width: 600px;
        margin-top: 2rem;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        max-height: 50vh;
        overflow-y: auto;
      }
      .results-container::-webkit-scrollbar { width: 6px; }
      .results-container::-webkit-scrollbar-track { background: transparent; }
      .results-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
      .result-item {
        background: rgba(0,0,0,0.2);
        border: 1px solid var(--card-border);
        padding: 1.2rem;
        border-radius: 14px;
        margin-bottom: 0.75rem;
        transition: all 0.2s ease;
      }
      .result-item:hover {
        border-color: var(--accent);
        background: rgba(0,0,0,0.35);
      }
      .download-btn {
        align-self: flex-start;
        padding: 0.6rem 1.4rem;
        font-size: 0.9rem;
        margin-top: 0.6rem;
      }
    }

    /* ── Mobile: full-screen native app feel ── */
    @media (max-width: 600px) {
      .blob { display: none; }
      body { justify-content: flex-start; }

      .container {
        position: sticky;
        top: 0;
        z-index: 50;
        padding: calc(var(--safe-top) + 12px) 20px 14px 20px;
        background: rgba(10, 10, 12, 0.92);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 0.5px solid rgba(255,255,255,0.08);
      }

      .results-container {
        padding: 6px 16px calc(var(--safe-bottom) + 16px) 16px;
        width: 100%;
        background: #000;
        max-height: none;
        overflow-y: visible;
      }
      .results-container h2 {
        font-size: 1.2rem;
        margin: 10px 0 14px 4px;
        color: var(--text-secondary);
        font-weight: 600;
      }

      .result-item {
        background: #1c1c1e;
        border: none;
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 10px;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.15s ease;
      }
      .result-item:active {
        background: #2c2c2e;
      }

      .result-title {
        font-size: 0.95rem;
        line-height: 1.35;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .result-meta {
        margin-top: 6px;
        gap: 12px;
        font-size: 0.82rem;
      }
      .result-meta span {
        background: rgba(255,255,255,0.06);
        padding: 3px 8px;
        border-radius: 6px;
      }

      .download-btn {
        width: 100%;
        text-align: center;
        padding: 13px;
        border-radius: 12px;
        font-size: 0.95rem;
        font-weight: 600;
        margin-top: 12px;
      }
      .download-btn:active {
        transform: scale(0.97);
        opacity: 0.85;
      }

      .filters {
        opacity: 0.7;
        font-size: 0.85rem;
      }
    }

    /* ── Shared styles ── */
    h1 {
      margin: 0 0 0.3rem 0;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 30%, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; text-align: left; }
      p { text-align: left; }
    }
    p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 400;
      margin: 0 0 1.5rem 0;
    }

    .search-group {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px 16px;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      outline: none;
      transition: all 0.25s ease;
    }
    input[type="text"]::placeholder { color: var(--text-muted); }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background: rgba(255,255,255,0.12);
    }

    button {
      background: var(--accent);
      border: none;
      padding: 12px 20px;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    button:hover {
      background: #7c3aed;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    button:active {
      transform: scale(0.96);
    }

    .results-container h2 {
      margin-top: 0;
      color: #a78bfa;
      font-size: 1.3rem;
    }
    .result-item {
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .result-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-primary);
      line-height: 1.4;
    }
    .result-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .filters {
      margin-top: 10px;
      text-align: left;
      font-size: 0.9rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
    }
    .filters input[type="checkbox"] {
      margin-right: 6px;
      width: auto;
      accent-color: var(--accent);
    }

    /* ── Loading Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.4rem;
    }
    .loading-subtext {
      color: var(--text-secondary);
      font-size: 0.9rem;
      max-width: 300px;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="container">
    <h1>Turent</h1>
    <p>Search & Download</p>

    <div class="search-group">
      <input type="text" id="movieInput" placeholder="Type a movie name..." autocomplete="off">
      <button id="searchBtn">Search</button>
    </div>
    <div class="filters">
      <label>
        <input type="checkbox" id="sortLatest"> Sort by Latest Release
      </label>
    </div>
  </div>

  <div class="results-container" id="resultsContainer" style="display: none;">
    <h2>Search Results</h2>
    <div id="resultsList" class="results-list"></div>
  </div>

  <div class="overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Finding & Downloading...</div>
    <div class="loading-subtext">We are searching the torrent swarm and acquiring the high-quality files. Please do not close this page. Your download will start automatically on this device shortly.</div>
  </div>

  <script>
    const btn = document.getElementById('searchBtn');
    const input = document.getElementById('movieInput');
    const overlay = document.getElementById('loadingOverlay');
    const resultsContainer = document.getElementById('resultsContainer');
    const resultsList = document.getElementById('resultsList');

    const BEST_TRACKERS = [
      'udp://tracker.opentrackr.org:1337/announce',
      'udp://tracker.openbittorrent.com:6969/announce',
      'udp://tracker.torrent.eu.org:451/announce',
      'udp://tracker.moeking.me:6969/announce',
      'udp://tracker.zer0day.to:1337/announce',
      'udp://tracker.leechers-paradise.org:6969/announce',
      'udp://coppersurfer.tk:6969/announce',
      'udp://tracker.internetwarriors.net:1337/announce',
      'wss://tracker.btorrent.xyz',
      'wss://tracker.openwebtorrent.com',
      'wss://tracker.fastcast.nz'
    ];
    const trString = BEST_TRACKERS.map(tr => '&tr=' + encodeURIComponent(tr)).join('');

    // ---------------------------------------------------------------------------
    // CLIENT-SIDE SEARCH: Runs directly from your phone's browser.
    // Your residential IP (Jio/Airtel) is never blocked by Cloudflare.
    // The Render server is NOT involved in search at all.
    // ---------------------------------------------------------------------------
    async function executeSearch() {
      const query = input.value.trim();
      if (!query) return;

      overlay.classList.add('active');
      document.querySelector('.loading-text').innerText = "Searching swarm...";
      document.querySelector('.loading-subtext').innerText = "Your phone is searching directly. No cloud middleman!";
      resultsContainer.style.display = 'none';

      try {
        let results = [];

        // Step 1: Search Cinemeta for IMDb ID (runs from phone browser — Cloudflare allows residential IPs)
        const metaRes = await fetch(
          `https://v3-cinemeta.strem.io/catalog/movie/top/search=${encodeURIComponent(query)}.json`
        );
        const metaText = await metaRes.text();
        if (metaText.trim().startsWith('<')) throw new Error('Cinemeta returned HTML — possible block. Try again.');
        const metaData = JSON.parse(metaText);

        if (!metaData || !metaData.metas || metaData.metas.length === 0) {
          throw new Error("No results found for this movie.");
        }

        const meta = metaData.metas[0];
        const imdbId = meta.imdb_id;

        // Step 2: Query Torrentio with IMDb ID (also runs from phone browser)
        let endpoint = `https://torrentio.strem.fun/stream/movie/${imdbId}.json`;
        if (meta.type === 'series') {
          endpoint = `https://torrentio.strem.fun/stream/series/${imdbId}:1:1.json`;
        }

        const torRes = await fetch(endpoint);
        const torText = await torRes.text();
        if (torText.trim().startsWith('<')) throw new Error('Torrentio returned HTML — possible block. Try again.');
        const torData = JSON.parse(torText);

        if (torData && torData.streams) {
          for (const s of torData.streams) {
            if (!s.infoHash) continue;

            let seeders = 0;
            let size = "Unknown";
            if (s.title) {
              const seedMatch = s.title.match(/👤\s*(\d+)/);
              if (seedMatch) seeders = parseInt(seedMatch[1], 10);
              const sizeMatch = s.title.match(/💾\s*([^⚙️\n]+)/);
              if (sizeMatch) size = sizeMatch[1].trim();
            }

            const cleanName = (s.title || query).split('\n')[0];
            const trackerName = (s.name || 'Torrent').split('\n')[0];
            const magnet = `magnet:?xt=urn:btih:${s.infoHash}&dn=${encodeURIComponent(cleanName)}${trString}`;

            results.push({
              name: `(${trackerName}) ${cleanName}`,
              size: size,
              seeders: seeders,
              magnet: magnet
            });
          }
        }

        if (results.length === 0) {
          throw new Error("No torrent results found for this title.");
        }

        // Sort by latest release year if checkbox is checked
        const isSortLatest = document.getElementById('sortLatest').checked;
        if (isSortLatest) {
          results.sort((a, b) => {
            const yearA = parseInt(a.name.match(/\((\d{4})\)/)?.[1] || 0, 10);
            const yearB = parseInt(b.name.match(/\((\d{4})\)/)?.[1] || 0, 10);
            return yearB - yearA;
          });
        }

        // Render results
        overlay.classList.remove('active');
        resultsContainer.style.display = 'block';
        resultsList.innerHTML = '';

        results.slice(0, 20).forEach(res => {
          const item = document.createElement('div');
          item.className = 'result-item';
          item.innerHTML = `
            <div class="result-title">${res.name}</div>
            <div class="result-meta">
              <span>Size: ${res.size}</span>
              <span>Seeders: ${res.seeders}</span>
            </div>
            <button class="download-btn" onclick="startDownload('${encodeURIComponent(res.magnet)}', '${res.name.replace(/'/g, "\\'")}')">Download</button>
          `;
          resultsList.appendChild(item);
        });
      } catch (e) {
        document.querySelector('.loading-text').innerText = "Error Occurred";
        document.querySelector('.loading-subtext').innerText = e.message;
        setTimeout(() => overlay.classList.remove('active'), 4000);
      }
    }

    // ---------------------------------------------------------------------------
    // DOWNLOAD: This still goes through the Render server's WebTorrent engine.
    // WebTorrent uses P2P — ISPs/Cloudflare can't block it.
    // ---------------------------------------------------------------------------
    async function startDownload(encodedMagnet, name) {
      overlay.classList.add('active');
      document.querySelector('.loading-text').innerText = "Connecting to swarm...";
      document.querySelector('.loading-subtext').innerText = "Finding peers and fetching torrent metadata. This can take up to 45 seconds for less-popular titles.";

      // Animated dots to show it's still alive
      let dotCount = 0;
      const tick = setInterval(() => {
        dotCount = (dotCount + 1) % 4;
        document.querySelector('.loading-text').innerText = "Connecting to swarm" + ".".repeat(dotCount);
      }, 500);

      try {
        const metaRes = await fetch('/api/metadata?magnet=' + encodedMagnet);
        const metaData = await metaRes.json();
        clearInterval(tick);

        if (!metaRes.ok) {
          throw new Error(metaData.error || "Could not fetch torrent metadata.");
        }
        if (!metaData.files || metaData.files.length === 0) {
          throw new Error("Could not parse torrent contents.");
        }

        const largestFile = metaData.files.reduce((a, b) => a.sizeBytes > b.sizeBytes ? a : b);

        document.querySelector('.loading-text').innerText = "Download Starting...";
        document.querySelector('.loading-subtext').innerText = `Downloading: ${largestFile.name} (${metaData.peers || 0} peers). Check your browser.`;

        window.location.href = `/api/download?magnet=${encodedMagnet}&fileIndex=${largestFile.index}`;

        setTimeout(() => overlay.classList.remove('active'), 3000);
      } catch (e) {
        clearInterval(tick);
        document.querySelector('.loading-text').innerText = "Error Occurred";
        document.querySelector('.loading-subtext').innerText = e.message + " — try a different torrent with more seeders.";
        setTimeout(() => overlay.classList.remove('active'), 5000);
      }
    }

    btn.addEventListener('click', executeSearch);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') executeSearch();
    });
  </script>
</body>
</html>
